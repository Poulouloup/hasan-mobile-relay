name: Plugin lint

on:
  push:
    branches: [main, master]
    paths:
      - "plugin/**"
      - ".github/workflows/plugin-lint.yml"
  pull_request:
    paths:
      - "plugin/**"
      - ".github/workflows/plugin-lint.yml"

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The plugin has no test suite (it depends on the Hermes gateway runtime,
      # not available in this repo — see plugin/hasan_delivery/adapter.py and
      # plugin/tools/android_tool.py docstrings). py_compile is the minimal
      # safety net: catch a syntax error before it breaks an existing install
      # on the next `git pull` + install-plugin.sh.
      - name: Byte-compile check
        run: python -m py_compile plugin/hasan_delivery/*.py plugin/tools/*.py
